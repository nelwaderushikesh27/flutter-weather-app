name: flutter_weather_app
description: A beautiful weather app built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  dio: ^5.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.66.0
  geolocator: ^11.0.0
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.4.0
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - .env.example
    - assets/images/
    - assets/icons/
